<!--
  Supported classes:
  - **.dark**: Use a dark theme.
  - **.no-bg**: Do not display a background.
  - **.off**: Display as turned off.
  - **.with-effects**: Show visual effects such as drop-shadow and light-glow (when on).

  Supported CSS variables:
  - **-\-simple-torch-bg-color**: The background circle fill color. _(Default: `rgb(33, 33, 33)`)_
  - **-\-simple-torch-outline-color**: The outline color around the background circle. _(Default: `dimgray`)_
  - **-\-simple-torch-rotation**: The angle of rotation (on the Z-axis). _(Default: `45deg`)_
  - **-\-simple-torch-stroke-color**: The stroke color. _(Default: `var(-\-simple-torch-bg-color)`)_
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 120 120">
  <defs>
    <!-- Effect: Light glow. -->
    <filter id="light-glow" filterUnits="userSpaceOnUse">
      <feDropShadow dx="-4" dy="0" flood-color="var(--__st-light-color)" flood-opacity="0.3" stdDeviation="5" />
      <feDropShadow dx="+4" dy="0" flood-color="var(--__st-light-color)" flood-opacity="0.3" stdDeviation="5" />
    </filter>
    <!-- Effect: Shadow. -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-opacity="0.33" />
    </filter>
  </defs>

  <style>
    svg {
      --__st-background-display: initial;
      --__st-bg-color: var(--simple-torch-bg-color, rgb(33, 33, 33));
      --__st-body-color-1: darkorange;
      --__st-body-color-2: orange;
      --__st-light-color: yellow;
      --__st-outline-color: var(--simple-torch-outline-color, dimgray);
      --__st-rotation: var(--simple-torch-rotation, 45deg);
      --__st-stroke-color: var(--simple-torch-stroke-color, var(--__st-bg-color));
      --__st-switch-color-1: darkorchid;
      --__st-switch-color-2: orchid;
    }

    svg.dark {
      --__st-body-color-1: dimgray;
      --__st-body-color-2: gray;
      --__st-light-color: goldenrod;
      --__st-switch-color-1: darkslategray;
      --__st-switch-color-2: slategray;
    }

    svg.no-bg {
      --__st-background-display: none;
    }

    #foreground {
      transform: rotateZ(var(--__st-rotation));
      transform-origin: center;
    }

    #light { transition: opacity 0.3s; }
    svg.off #light { opacity: 0; }
    svg.with-effects #light {
      filter: url(#light-glow);
      stroke: none;
    }

    svg.with-effects #torch-body { filter: url(#shadow); }

    #torch-switch-thingy { transition: transform 0.1s; }
    svg.off #torch-switch-thingy { transform: translate(0, 15px); }
  </style>

  <!-- Background. -->
  <g id="background" fill="var(--__st-bg-color)" stroke="var(--__st-outline-color)">
    <circle cx="60" cy="60" r="59" />
  </g>

  <!-- Foreground. -->
  <g id="foreground">
    <!-- Light. -->
    <g id="light" stroke="var(--__st-stroke-color)" stroke-linejoin="round" stroke-width="2">
      <path fill="var(--__st-light-color)" d="M25 20 a100 125 0 0 1 70 0 z" />
    </g>

    <!-- Torch body. -->
    <g id="torch-body" stroke="var(--__st-stroke-color)" stroke-linejoin="round" stroke-width="2">
      <path fill="var(--__st-body-color-1)" d="M25 20 h70 v10 h-70 z" />
      <path fill="var(--__st-body-color-2)" d="M25 30 h70 a50 50 0 0 1 -15 25 h-40 a50 50 0 0 1 -15 -25 z" />
      <path fill="var(--__st-body-color-1)" d="M40 55 h40 v55 a100 125 0 0 1 -40 0 z" />
    </g>

    <!-- Torch switch. -->
    <g id="torch-switch" stroke="var(--__st-stroke-color)" stroke-linejoin="round" stroke-width="2">
      <path fill="var(--__st-switch-color-1)" d="M55 70 a5 5 0 1 1 10 0 v15 a5 5 0 1 1 -10 0 z" />
      <circle id="torch-switch-thingy" fill="var(--__st-switch-color-2)" cx="60" cy="70" r="7.5" />
    </g>
  </g>
</svg>
